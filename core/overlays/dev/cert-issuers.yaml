# SelfSigned -> CA issuer chain.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agrippa-local-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  isCA: true
  commonName: "Agrippa Local Dev CA"
  secretName: agrippa-local-ca-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: agrippa-ca
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ca:
    secretName: agrippa-local-ca-tls
