# Wave 5: the shared Gateway's TLS certificate, issued by the local CA.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agrippa-gateway-tls
  namespace: istio-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  secretName: agrippa-gateway-tls
  dnsNames:
    - argocd.127.0.0.1.nip.io
    - dashboard.davidsouther.com.127.0.0.1.nip.io
  issuerRef:
    name: agrippa-ca
    kind: ClusterIssuer
