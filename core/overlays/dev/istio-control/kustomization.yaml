# Istio ambient's control plane and data plane -- istiod, theistio-cni node agent, and ztunnel.
#
# The `cni` chart deliberately OMITS `global.platform: k3d` to avoid clobbering overrides; see istio/istio#57110
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
helmCharts:
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: istiod
    namespace: istio-system
    valuesInline:
      global:
        platform: k3d
      profile: ambient
  - name: cni
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: istio-cni
    namespace: istio-system
    valuesInline:
      profile: ambient
      cniConfDir: /var/lib/rancher/k3s/agent/etc/cni/net.d
      cniBinDir: /var/lib/rancher/k3s/data/cni
  - name: ztunnel
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: ztunnel
    namespace: istio-system
    valuesInline:
      global:
        platform: k3d
      profile: ambient
