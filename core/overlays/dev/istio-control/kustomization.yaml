# Istio ambient's control plane and data plane -- istiod, the istio-cni node agent, and ztunnel.
#
# Setting `global.platform: k3d` on the `cni` chart (unlike istiod/ztunnel
# above) would apply its bundled k3d platform preset, which clobbers the
# cniConfDir/cniBinDir overrides below with its own defaults -- known
# upstream gap, istio/istio#57110. Deliberately left unset here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
helmCharts:
  - name: istiod
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: istiod
    namespace: istio-system
    valuesInline:
      global:
        platform: k3d
      profile: ambient
  - name: cni
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: istio-cni
    namespace: istio-system
    valuesInline:
      profile: ambient
      cniConfDir: /var/lib/rancher/k3s/agent/etc/cni/net.d
      cniBinDir: /var/lib/rancher/k3s/data/cni
  - name: ztunnel
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: ztunnel
    namespace: istio-system
    valuesInline:
      global:
        platform: k3d
      profile: ambient
