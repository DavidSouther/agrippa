# Wave 5: routes the ArgoCD UI host through the shared Gateway to
# argocd-server. Backend-TLS route (port 443, argocd-server's HTTPS listener)
# -- see argocd-destinationrule.yaml for the TLS re-origination this needs.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: agrippa-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - argocd.127.0.0.1.nip.io
  rules:
    - backendRefs:
        - name: argocd-server
          port: 443
