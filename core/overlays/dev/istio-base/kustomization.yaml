# Wave -10: Istio's `base` chart (CRDs shared across istiod/cni/ztunnel).
# Pinned 1.30.2 (current stable minor line; base/istiod/cni/ztunnel release in
# lockstep). namespace.yaml fills the one gap `helm template` leaves: it never
# emits a Namespace object on its own (unlike `helm install --create-namespace`).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-10"
resources:
  - namespace.yaml
helmCharts:
  - name: base
    repo: https://istio-release.storage.googleapis.com/charts
    version: 1.30.2
    releaseName: istio-base
    namespace: istio-system
    valuesInline:
      global:
        platform: k3d
      profile: ambient
