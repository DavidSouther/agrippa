# Namespace istio-system: `helmCharts:` inflation runs `helm template`, which
# (unlike `helm install --create-namespace`) never emits a Namespace object on
# its own -- the one gap only Helm-sourced Istio needs filled by hand. Wired
# into istio-base/kustomization.yaml's resources in Step 1.
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
