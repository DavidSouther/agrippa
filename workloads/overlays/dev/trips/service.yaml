# Wave 0: ClusterIP fronting the trips Deployment's pods for the HTTPRoute
# to target.
apiVersion: v1
kind: Service
metadata:
  name: trips
  namespace: trips
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: ClusterIP
  selector:
    app: trips
  ports:
    - port: 80
      targetPort: 80
