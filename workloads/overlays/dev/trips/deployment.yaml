# imagePullPolicy: Never schedules only against an image already present on
# the node -- `mise run workloads:build` must be (re-)run against this exact
# cluster before this syncs, or the pod sits in ErrImageNeverPull. No
# /healthz in this image (unlike resume's); probes target plain /.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trips
  namespace: trips
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trips
  template:
    metadata:
      labels:
        app: trips
    spec:
      containers:
        - name: trips
          image: trips:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
