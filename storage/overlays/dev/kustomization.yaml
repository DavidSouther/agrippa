# Storage layer: the CNPG operator, the shared postgres Cluster, the shared
# Valkey instance, and the smoke fixture's sops-encrypted credentials.
# Composed at four intra-storage sync-waves (-10 namespaces+operator, -5
# credential Secrets, 0 shared operands, 5 per-consumer Database) -- see each
# nested kustomization's own commonAnnotations for its wave.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - cnpg-operator/
  - ../../../secrets/dev/storage
