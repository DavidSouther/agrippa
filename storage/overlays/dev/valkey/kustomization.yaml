# Wave 0: the shared standalone Valkey instance. Chart pinned to 0.10.0
# (appVersion 9.1.0, the latest release on https://valkey.io/valkey-helm/'s
# own index.yaml as of this build -- research:public). releaseName "valkey"
# collapses valkey.fullname to the bare "valkey" Service/pod-label name
# (verified against the chart's own _helpers.tpl: "if release name contains
# chart name, use release name only"), matching this design's
# valkey.storage.svc:6379 / app.kubernetes.io/name=valkey assumptions.
# auth.aclUsers is a map keyed by username; each user's password is read
# from usersExistingSecret at a key defaulting to that same username (chart
# templates/_helpers.tpl + deploy_valkey.yaml), so smoke-valkey's `default`/
# `smoke` keys need no explicit passwordKey override. The chart requires a
# `default` user whenever auth.enabled is true (_helpers.tpl
# validateAuthConfig), hence its entry below alongside `smoke`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
helmCharts:
  - name: valkey
    repo: https://valkey.io/valkey-helm/
    version: 0.10.0
    releaseName: valkey
    namespace: storage
    # helm template semantics: kustomize's helmCharts inflation renders
    # (and would otherwise plain-apply) the chart's helm.sh/hook: test Pod
    # (valkey-test-auth-existing) as a literal, permanent Pod object -- ArgoCD
    # doesn't understand Helm hook annotations, so it isn't a one-shot `helm
    # test` run. skipTests excludes it (design's own flagged "helm template
    # semantics" edge case, confirmed live at build).
    skipTests: true
    valuesInline:
      auth:
        enabled: true
        usersExistingSecret: smoke-valkey
        aclUsers:
          default:
            permissions: "~* &* +@all"
          smoke:
            permissions: "~smoke:* +@all"
      dataStorage:
        enabled: true
        className: local-path
        requestedSize: 512Mi
# Workaround for a real kustomize 5.8.0+ regression (kubernetes-sigs/kustomize
# #6058): the top-level `namespace:` transformer no longer stamps
# metadata.namespace onto resources generated by `helmCharts:` inflation when
# the chart's own templates don't hardcode `{{ .Release.Namespace }}` (this
# chart's templates don't) -- confirmed live: the first sync landed every
# Valkey object in `argocd` (the Application's `destination.namespace`
# fallback), not `storage`. `helmCharts[].namespace: storage` above only sets
# `.Release.Namespace` for in-template use, not metadata.namespace itself.
# Scoped precisely to this sub-kustomization's own resources (the maintainer-
# acknowledged workaround from the issue thread) -- no cross-contamination
# risk, since cnpg-operator/'s resources are a wholly separate kustomization.
# Matched by the chart's own common label rather than an enumerated kind list,
# so a future chart bump adding a new kind (NetworkPolicy, PodDisruptionBudget,
# etc. -- all already templated behind disabled-by-default values) still gets
# namespaced without this patch needing to track the chart's template set.
patches:
  - target:
      labelSelector: "app.kubernetes.io/instance=valkey"
    patch: |-
      - op: add
        path: /metadata/namespace
        value: storage
