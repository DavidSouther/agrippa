apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
  storage:
    storageClass: local-path
    size: 1Gi
  backup:
    retentionPolicy: 7d
    barmanObjectStore:
      destinationPath: s3://postgres-backups/
      endpointURL: http://minio-backup.storage.svc:9000
      s3Credentials:
        accessKeyId:
          name: minio-backup
          key: accessKeyId
        secretAccessKey:
          name: minio-backup
          key: secretAccessKey
      wal:
        compression: gzip
      data:
        compression: gzip
  managed:
    roles:
      - name: smoke
        login: true
        passwordSecret:
          name: smoke-db
      - name: keycloak
        login: true
        passwordSecret:
          name: keycloak-db
      - name: forgejo
        login: true
        passwordSecret:
          name: forgejo-db
      - name: flagsmith
        login: true
        passwordSecret:
          name: flagsmith-db
