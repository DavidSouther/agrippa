apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  # robfig/cron with a leading seconds field: 03:00:00 every day.
  schedule: "0 0 3 * * *"
  immediate: true
  backupOwnerReference: self
  method: barmanObjectStore
  cluster:
    name: postgres
