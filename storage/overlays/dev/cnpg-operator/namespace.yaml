# Namespace cnpg-system: `helmCharts:` inflation runs `helm template`, which
# (unlike `helm install --create-namespace`) never emits a Namespace object on
# its own -- the same gap core/overlays/dev/istio-base/namespace.yaml fills
# for Istio. The CNPG operator chart lands in Step 1.
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
