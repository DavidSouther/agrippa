apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-backup
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-backup
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio-backup
  template:
    metadata:
      labels:
        app: minio-backup
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-backup
                  key: accessKeyId
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-backup
                  key: secretAccessKey
          ports:
            - name: s3
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-backup
---
apiVersion: v1
kind: Service
metadata:
  name: minio-backup
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  selector:
    app: minio-backup
  ports:
    - name: s3
      port: 9000
      targetPort: s3
