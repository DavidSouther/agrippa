apiVersion: batch/v1
kind: Job
metadata:
  name: minio-backup-create-bucket
  namespace: storage
  annotations:
    # barman-cloud never creates the destination bucket itself, so this
    # one-shot hook makes it before the Cluster starts archiving WAL.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set backup "http://minio-backup.storage.svc:9000" \
                "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" 2>/dev/null; do
                echo "waiting for minio-backup"; sleep 3
              done
              mc mb --ignore-existing backup/postgres-backups
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-backup
                  key: accessKeyId
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-backup
                  key: secretAccessKey
