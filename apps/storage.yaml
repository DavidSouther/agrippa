# Storage owns postgres & valkey
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: storage/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CNPG's Cluster CRD is large enough to overflow client-side apply's
    # last-applied-configuration annotation, and SkipDryRunOnMissingResource
    # lets the wave-0 Cluster / wave-5 Database CRs sync before their own
    # CRDs are dry-run-validatable on the very first apply -- same seam as
    # apps/core.yaml's syncOptions.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
