# Storage owns postgres & valkey
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # `syncOptions: ServerSideApply=true` (below) auto-enables ArgoCD's
    # Structured Merge Diff strategy application-wide -- the same mechanism
    # apps/core.yaml documents for its Gateway/HTTPRoute OutOfSync symptom
    # (argoproj/argo-cd#22151). SMD predicts live state via a local
    # simulation rather than a real API-server dry-run, so it mispredicts
    # CNPG's mutating-webhook-defaulted Cluster fields (bootstrap.initdb,
    # affinity, monitoring, postgresql.parameters, etc. -- none set in git,
    # all added by the CNPG webhook) -- live-verified: storage.status.resources
    # showed only `Cluster postgres` OutOfSync once Step 3's Cluster synced,
    # with every extra field CNPG-controller-owned. Force Server-Side Diff
    # (a real dry-run apply, so admission/defaulting participates correctly),
    # mirroring apps/core.yaml's fix exactly.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: storage/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # CNPG's Cluster CRD is large enough to overflow client-side apply's
    # last-applied-configuration annotation, and SkipDryRunOnMissingResource
    # lets the wave-0 Cluster / wave-5 Database CRs sync before their own
    # CRDs are dry-run-validatable on the very first apply -- same seam as
    # apps/core.yaml's syncOptions.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
