# Storage owns postgres & valkey
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: storage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # See apps/core.yaml:9-14's compare-options comment for the general
    # SMD-mispredicts/ServerSideDiff-fixes-it rationale (argoproj/argo-cd#22151).
    # Here it additionally mispredicts CNPG's mutating-webhook-defaulted Cluster
    # fields (bootstrap.initdb, affinity, monitoring, postgresql.parameters,
    # etc. -- none set in git) -- live-verified: storage.status.resources showed
    # only `Cluster postgres` OutOfSync once Step 3's Cluster synced, with every
    # extra field CNPG-controller-owned.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: storage/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # See apps/core.yaml:29-35's syncOptions comment for the general
    # ServerSideApply/SkipDryRunOnMissingResource rationale. Here,
    # SkipDryRunOnMissingResource additionally lets the wave-0 Cluster /
    # wave-5 Database CRs sync before CNPG's own CRDs are dry-run-validatable
    # on the very first apply.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
