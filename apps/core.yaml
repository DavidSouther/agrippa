# Core owns metallb, Gateway API CRDs, cert-manager & istio
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # `syncOptions: ServerSideApply=true` (below) silently auto-enables
    # ArgoCD's deprecated "Structured Merge Diff" strategy (v3.4.4
    # controller/state.go: `if ... HasOption("ServerSideApply=true") {
    # diffConfigBuilder.WithStructuredMergeDiff(true) }`, application-wide,
    # no per-resource override). SMD predicts the live state via a LOCAL
    # simulation rather than a real API-server dry-run, and mispredicts
    # CRD-defaulted/controller-owned fields -- exactly the Gateway/HTTPRoute
    # symptom this feature-step hit live (permanently OutOfSync even though
    # `spec` matched byte-for-byte; three different `ignoreDifferences` forms
    # -- jsonPointers, jqPathExpressions, managedFieldsManagers -- all failed
    # to clear it, because the real problem was the diff algorithm's
    # prediction, not un-ignored content). This is a known, still-open
    # upstream limitation (argoproj/argo-cd#22151, matching this exact
    # Gateway API scenario). Fix: force the stable "Server-Side Diff"
    # strategy instead, which performs a real dry-run apply against the API
    # server so admission/defaulting participates correctly.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: core/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # core will carry cert-manager/Gateway API/Istio CRDs in a later
    # feature-step, which need server-side apply (client-side apply's
    # last-applied-configuration annotation overflows on large CRDs) and
    # SkipDryRunOnMissingResource for CRD/CR ordering across syncs. Note that
    # syncOptions nests under syncPolicy, not as a sibling of it -- the
    # Application CRD's strict decoding rejects a spec-level sibling as an
    # unknown field.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
  # istiod self-patches its own webhooks' caBundle (with its self-signed CA)
  # AND failurePolicy (Ignore at chart-default -> Fail once istiod considers
  # itself ready to serve validation) at startup and on every cert-rotation
  # reconcile (both live-verified this session: istiod-default-validator and
  # istio-validator-istio-system's live objects carry a non-empty caBundle
  # and failurePolicy: Fail, neither of which the git-sourced manifest ever
  # sets), which would otherwise leave `core` permanently OutOfSync fighting
  # istiod's own controller. Scoped to exactly those two webhook configs and
  # fields, not a blanket admissionregistration.k8s.io ignore -- cert-manager's
  # and metallb's webhook configs stay diffed normally.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
