# Core owns metallb, Gateway API CRDs, cert-manager & istio
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: core/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # core will carry cert-manager/Gateway API/Istio CRDs in a later
    # feature-step, which need server-side apply (client-side apply's
    # last-applied-configuration annotation overflows on large CRDs) and
    # SkipDryRunOnMissingResource for CRD/CR ordering across syncs. Note that
    # syncOptions nests under syncPolicy, not as a sibling of it -- the
    # Application CRD's strict decoding rejects a spec-level sibling as an
    # unknown field.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
  # istiod self-patches its own webhooks' caBundle with its self-signed CA at
  # startup and on every cert-rotation reconcile (live-verified this session:
  # istiod-default-validator and istio-validator-istio-system both carry a
  # non-empty caBundle the git-sourced manifest never sets), which would
  # otherwise leave `core` permanently OutOfSync fighting istiod's own
  # controller. Scoped to exactly those two webhook configs, not a blanket
  # admissionregistration.k8s.io ignore -- cert-manager's and metallb's
  # webhook configs stay diffed normally.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
