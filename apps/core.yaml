# Core owns metallb, Gateway API CRDs, cert-manager & istio
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: core/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Forward seam: core will carry cert-manager/Gateway API/Istio CRDs in a
    # later feature-step, which need server-side apply the same way ArgoCD's
    # own install does (Step 2) to avoid the client-side annotation-size
    # limit, and SkipDryRunOnMissingResource for CRD/CR ordering across syncs.
    # (syncOptions nests under syncPolicy per the Application CRD schema --
    # plan.md's Implementation Outline had this as a spec-level sibling of
    # syncPolicy, which `kubectl apply` rejects as an unknown field under
    # strict decoding; corrected here against the live v3.4.4 CRD schema.)
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
  # istiod self-patches its own webhooks' caBundle (with its self-signed CA)
  # AND failurePolicy (Ignore at chart-default -> Fail once istiod considers
  # itself ready to serve validation) at startup and on every cert-rotation
  # reconcile (both live-verified this session: istiod-default-validator and
  # istio-validator-istio-system's live objects carry a non-empty caBundle
  # and failurePolicy: Fail, neither of which the git-sourced manifest ever
  # sets), which would otherwise leave `core` permanently OutOfSync fighting
  # istiod's own controller. Scoped to exactly those two webhook configs and
  # fields, not a blanket admissionregistration.k8s.io ignore -- cert-manager's
  # and metallb's webhook configs stay diffed normally.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
