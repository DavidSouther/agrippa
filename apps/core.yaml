# Core owns metallb, Gateway API CRDs, cert-manager & istio
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: core/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # core will carry cert-manager/Gateway API/Istio CRDs in a later
    # feature-step, which need server-side apply (client-side apply's
    # last-applied-configuration annotation overflows on large CRDs) and
    # SkipDryRunOnMissingResource for CRD/CR ordering across syncs. Note that
    # syncOptions nests under syncPolicy, not as a sibling of it -- the
    # Application CRD's strict decoding rejects a spec-level sibling as an
    # unknown field.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
  # istiod self-patches its own webhooks' caBundle (with its self-signed CA)
  # AND failurePolicy (Ignore at chart-default -> Fail once istiod considers
  # itself ready to serve validation) at startup and on every cert-rotation
  # reconcile (both live-verified this session: istiod-default-validator and
  # istio-validator-istio-system's live objects carry a non-empty caBundle
  # and failurePolicy: Fail, neither of which the git-sourced manifest ever
  # sets), which would otherwise leave `core` permanently OutOfSync fighting
  # istiod's own controller. Scoped to exactly those two webhook configs and
  # fields, not a blanket admissionregistration.k8s.io ignore -- cert-manager's
  # and metallb's webhook configs stay diffed normally.
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istiod-default-validator
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: istio-validator-istio-system
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
        - .webhooks[].failurePolicy
    # Gateway API's Gateway/HTTPRoute both carry a registered `status`
    # subresource that istiod's Gateway API controller populates
    # (Programmed/Accepted conditions, addresses, attachedRoutes) -- none of
    # which the git-sourced manifest (spec-only, no status:) ever sets, so
    # every reconcile left `core` permanently OutOfSync once the Gateway
    # (Step 4) landed. Both `jsonPointers: [/status]` and
    # `jqPathExpressions: [.status]` were tried first and, live-verified this
    # session, left both resources still OutOfSync against the live
    # ServerSideApply-managed objects (confirmed via `argocd app get --core`,
    # which kept reporting these two OutOfSync after each self-heal sync
    # attempt, even though a field-by-field spec comparison matched exactly).
    # `managedFieldsManagers` is the mechanism actually built for this case --
    # ignore whatever field manager(s) other than argocd-controller own on
    # this resource -- and is confirmed via `--show-managed-fields` to be
    # the correct owner set: istio.io/gateway-controller and pilot-discovery
    # both write the `status` subresource on Gateway; pilot-discovery alone
    # writes it on HTTPRoute. The feature test itself still reads live
    # `.status` directly via `kubectl get`, which this does not affect.
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: istio-ingress
      name: agrippa-gateway
      managedFieldsManagers:
        - istio.io/gateway-controller
        - pilot-discovery
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: argocd
      name: argocd
      managedFieldsManagers:
        - pilot-discovery
