# Observability owns loki, grafana, tempo, mimir, alloy
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    # See apps/core.yaml:9-14's compare-options comment for the general
    # SMD-mispredicts/ServerSideDiff-fixes-it rationale (argoproj/argo-cd#22151).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: observability/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # See apps/core.yaml:29-35's syncOptions comment for the general
    # ServerSideApply/SkipDryRunOnMissingResource rationale.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
