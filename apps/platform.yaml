# Platform owns ArgoCD self-management, keycloak, forgejo, & flagsmith
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # See apps/core.yaml:9-14 and argoproj/argo-cd#22151.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: platform/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # See apps/core.yaml:29-35 for syncOptions reasoning.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
