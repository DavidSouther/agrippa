# Platform owns ArgoCD self-management, keycloak, forgejo, & flagsmith
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # See apps/core.yaml:9-14 and argoproj/argo-cd#22151. Here it additionally
    # mispredicts the keycloaks.k8s.keycloak.org CRD's schema-defaulted fields
    # (structural-schema `default:`, not a webhook -- this Operator ships none).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    repoURL: https://github.com/DavidSouther/agrippa.git
    targetRevision: main
    path: platform/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # See apps/core.yaml:29-35 for syncOptions reasoning. Here,
    # SkipDryRunOnMissingResource additionally lets the Keycloak CRs sync
    # before the Operator's own CRDs are dry-run-validatable on the very
    # first apply.
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
