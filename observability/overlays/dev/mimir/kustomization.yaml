# mimir-distributed at one replica per component
#
# Chart 6.x defaults to the newer Kafka-backed "ingest storage" architecture
# (kafka.enabled: true), adding a whole extra Kafka broker plus an ingester
# zone-awareness requirement. The chart ships an official
# classic-architecture.yaml escape hatch back to the pre-6.x direct
# distributor->ingester path with no Kafka.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
helmCharts:
  - name: mimir-distributed
    repo: https://grafana.github.io/helm-charts
    version: 6.1.0
    releaseName: mimir
    namespace: observability
    skipTests: true
    valuesInline:
      # classic-architecture.yaml, inlined (see comment above)
      kafka:
        enabled: false
      mimir:
        structuredConfig:
          limits:
            # BUILD-TIME BUG, found live post-deploy alongside the
            # replication_factor fix above: the chart's per-tenant default
            # (10000 items/s, 200000 burst) throttled Alloy's own retry queue
            # once writes started succeeding, because roughly 13h of backlog
            # had piled up in Alloy's WAL while every write was failing on
            # the replication-factor bug. Raised generously for this
            # single-tenant ("anonymous") dev cluster, where the real cost of
            # a higher static ceiling is zero.
            ingestion_rate: 100000
            ingestion_burst_size: 2000000
          ingest_storage:
            enabled: false
          ingester:
            push_grpc_method_enabled: true
            ring:
              # Chart default (3) exceeds this overlay's single ingester replica.
              replication_factor: 1
      ingester:
        replicas: 1
        zoneAwareReplication:
          enabled: false
        persistentVolume:
          storageClass: local-path
      querier:
        replicas: 1
      query_scheduler:
        replicas: 1
      store_gateway:
        zoneAwareReplication:
          enabled: false
        persistentVolume:
          storageClass: local-path
      alertmanager:
        persistentVolume:
          storageClass: local-path
      compactor:
        persistentVolume:
          storageClass: local-path
      minio:
        persistence:
          storageClass: local-path
      # Zone-by-zone coordination is meaningless without zone-aware replication
      rollout_operator:
        enabled: false
patches:
  - target:
      kind: Job
      name: mimir-minio-post-job
    # Unnecessary, handled by the ArgoCD deployment jobs
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: mimir-minio-post-job
  - target:
      labelSelector: app=minio
    patch: |-
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      kind: ServiceAccount
      name: minio-sa
    patch: |-
      - op: add
        path: /metadata/namespace
        value: observability
