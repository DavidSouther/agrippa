# Wave 0: mimir-distributed at one replica per component. Chart NOT moved off
# grafana.github.io/helm-charts (research:public, re-verified live at build)
# -- version 6.1.0, the newest non-weekly-channel release as of this build
# (the repo's newest entries are a "weekly" prerelease channel; 6.1.0 is the
# newest stable tag).
#
# Chart 6.x defaults to the newer Kafka-backed "ingest storage" architecture
# (kafka.enabled: true), adding a whole extra Kafka broker + ingester
# zone-awareness requirement neither this feature-step's design nor its own
# ~10-pod estimate accounted for (confirmed live at build). The chart ships
# an official classic-architecture.yaml escape hatch back to the pre-6.x
# direct distributor->ingester path with no Kafka; inlined below rather than
# referenced, since helmCharts: valuesInline can't layer an extra values
# file. This keeps the deployment to the single-node, minimal-footprint shape
# this feature-step's design intends.
#
# ingester and store_gateway both default zoneAwareReplication.enabled: true
# (3 logical zones, sharding a component's total replicas across all three --
# confirmed live: with the chart's own default replicas, this renders THREE
# ingester StatefulSets, not one). Disabled here for both, so their
# top-level `replicas: 1` is the single StatefulSet's actual pod count, per
# this feature-step's own one-replica-per-component intent.
#
# alertmanager, distributor, overrides_exporter, ruler, query_frontend,
# compactor, and the gateway already default to 1 replica; only ingester,
# querier, and query_scheduler default above 1 (3, 2, 2 respectively) and are
# overridden below. The chunks/index/metadata/results memcached-based caches
# all default disabled (enabled: false) and are left untouched. The bundled
# minio (chart default, kept per this feature-step's operator-over-hand-rolled
# convention) needs its own persistence.storageClass set explicitly, same as
# every other stateful component's PVC.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
helmCharts:
  - name: mimir-distributed
    repo: https://grafana.github.io/helm-charts
    version: 6.1.0
    releaseName: mimir
    namespace: observability
    # helm template semantics (confirmed live at build, same caveat Storage
    # hit for Valkey): kustomize's helmCharts: inflation renders every
    # helm.sh/hook-annotated resource as a literal, permanent object --
    # ArgoCD doesn't run `helm test`/`helm install` hook lifecycles.
    # skipTests excludes the chart's own helm.sh/hook: test Job
    # (mimir-smoke-test). The bundled minio subchart's own post-install/
    # post-upgrade bucket-creation Job (mimir-minio-post-job) isn't a `test`
    # hook, so skipTests doesn't touch it; deleted explicitly below via the
    # patches: $patch delete idiom, scoped to this sub-kustomization only.
    skipTests: true
    valuesInline:
      # classic-architecture.yaml, inlined (see comment above)
      kafka:
        enabled: false
      mimir:
        structuredConfig:
          limits:
            # BUILD-TIME BUG, found live post-deploy alongside the
            # replication_factor fix above: the chart's per-tenant default
            # (10000 items/s, 200000 burst) throttled Alloy's own retry queue
            # once writes started succeeding, because roughly 13h of backlog
            # had piled up in Alloy's WAL while every write was failing on
            # the replication-factor bug. Raised generously for this
            # single-tenant ("anonymous") dev cluster, where the real cost of
            # a higher static ceiling is zero.
            ingestion_rate: 100000
            ingestion_burst_size: 2000000
          ingest_storage:
            enabled: false
            kafka:
              address: null
              topic: null
              auto_create_topic_default_partitions: null
          distributor:
            remote_timeout: null
          ingester:
            push_grpc_method_enabled: null
            ring:
              # BUILD-TIME BUG, found live post-deploy: the chart sets no
              # explicit replication_factor, so Mimir's binary default (3)
              # applies -- impossible to satisfy with this feature-step's own
              # single ingester replica above. Every remote_write was
              # therefore failing with "at least 2 live replicas required,
              # could only find 1" (confirmed in the distributor's own logs),
              # so no metric had ever actually been ingested. Matches this
              # single-ingester, single-node dev deployment's real replication
              # capacity.
              replication_factor: 1
      ingester:
        replicas: 1
        zoneAwareReplication:
          enabled: false
        persistentVolume:
          storageClass: local-path
      querier:
        replicas: 1
      query_scheduler:
        replicas: 1
      store_gateway:
        zoneAwareReplication:
          enabled: false
        persistentVolume:
          storageClass: local-path
      alertmanager:
        persistentVolume:
          storageClass: local-path
      compactor:
        persistentVolume:
          storageClass: local-path
      minio:
        persistence:
          storageClass: local-path
      # rollout_operator.enabled defaults to true (a whole extra Deployment
      # plus mutating/validating admission webhooks for coordinated
      # zone-by-zone rollout/downscale). Confirmed live: with
      # zoneAwareReplication disabled above, its webhooks still intercept
      # every StatefulSet create/update in the observability namespace
      # (namespaceSelector-scoped, not conditioned on the zone-aware
      # annotations it would otherwise coordinate) -- and while the operator
      # pod itself was still becoming Ready, ArgoCD's ServerSideDiff dry-run
      # failed outright ("no endpoints available for service
      # mimir-rollout-operator"), blocking comparison for the whole
      # Application. Zone-by-zone coordination is meaningless without
      # zone-aware replication, so the whole subchart (Chart.yaml's
      # `condition: rollout_operator.enabled`) is disabled rather than
      # patching around its webhook.
      rollout_operator:
        enabled: false
# The bundled minio subchart's own generic post-install/post-upgrade Job
# (buckets/users/policies/customCommands/svcaccts) -- not a `helm.sh/hook:
# test` hook, so skipTests above doesn't remove it. helm template semantics
# render it as a literal, permanent Job (same caveat as the smoke-test hook
# above). Confirmed live: it runs the identical /config/initialize script
# against the identical mimir-minio ConfigMap/Secret as the separate,
# non-hook "mimir-make-minio-buckets-5.4.0" Job the mimir-distributed chart
# itself already authors (driven by the same minio.buckets values) -- the two
# Jobs create the same two buckets redundantly. Deleted here, scoped to this
# sub-kustomization only; the non-hook Job (which ArgoCD's plain-apply
# lifecycle handles correctly, unlike a helm-hook-flavored one with a
# hook-succeeded delete policy) is left to do the actual bucket creation.
#
# Workaround for the real kustomize 5.8.0+ regression (kubernetes-sigs/
# kustomize #6058), same as Storage's own Valkey precedent: the top-level
# `namespace:` transformer doesn't stamp metadata.namespace onto resources
# generated by helmCharts: inflation when the chart's own templates don't
# hardcode {{ .Release.Namespace }} -- confirmed live: the bundled minio
# subchart's templates don't, so its first sync landed every minio object
# (ConfigMap/Secret/Service x2/PVC/Deployment, all labeled app: minio, plus
# the labelless minio-sa ServiceAccount) in `argocd`, not `observability` --
# and, starved of a real mimir-minio Service to resolve, every other Mimir
# component that talks to object storage crash-looped on DNS lookup failure.
# The rest of mimir-distributed's own templates DO hardcode the namespace
# (confirmed live: none of its own resources needed this patch), so the
# patch is scoped to only the minio-labeled resources and the one
# unlabeled ServiceAccount, not the whole sub-kustomization.
patches:
  - target:
      kind: Job
      name: mimir-minio-post-job
    patch: |-
      $patch: delete
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: mimir-minio-post-job
  - target:
      labelSelector: app=minio
    patch: |-
      - op: add
        path: /metadata/namespace
        value: observability
  - target:
      kind: ServiceAccount
      name: minio-sa
    patch: |-
      - op: add
        path: /metadata/namespace
        value: observability
