# Grafana on SQLite + local-path PVC with explicit admin/admin dev credential
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "5"
helmCharts:
  - name: grafana
    repo: https://grafana-community.github.io/helm-charts
    version: 12.7.2
    releaseName: grafana
    namespace: observability
    valuesInline:
      # Dev only!
      adminUser: admin
      adminPassword: admin
      service:
        # Coordinate with Grafana HTTPRoute
        port: 3000
      persistence:
        enabled: true
        type: pvc
        storageClassName: local-path
      deploymentStrategy:
        # default is RollingUpdate. On a single-node cluster two Grafana pods
        # would briefly mount the same ReadWriteOnce PVC
        type: Recreate
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.observability.svc:3100
              # Reassigning a provisioned datasource's uid crashloops the
              # provisioning module -- pinned to the existing value.
              uid: P8E80F9AEF21F6940
            - name: Mimir
              type: prometheus
              access: proxy
              url: http://mimir-gateway.observability.svc/prometheus
              uid: PAE45454D0EDB9216
            - name: Tempo
              type: tempo
              access: proxy
              url: http://tempo.observability.svc:3200
              uid: P214B5B846CF3925F
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ""
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      # kustomize's helmCharts inflation re-fetches the chart into its own
      # gitignored cache, where a file: reference can't reliably resolve --
      # inlined via json: instead.
      dashboards:
        default:
          web-analytics:
            # Generated from dashboards/web-analytics/main.jsonnet; regenerate with `mise run dashboards:build`.
            json: |-
              {
                 "description": "Traffic through the shared agrippa-gateway: request volume, status codes, latency, and top destinations, sourced from Istio's istio_requests_total/istio_request_duration_milliseconds telemetry.",
                 "panels": [
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 0,
                             "unit": "short"
                          }
                       },
                       "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 0,
                          "y": 0
                       },
                       "id": 1,
                       "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "reduceOptions": {
                             "calcs": [
                                "lastNotNull"
                             ]
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(increase(istio_requests_total{reporter=\"source\"}[$__range]))",
                             "refId": "A"
                          }
                       ],
                       "title": "Total Requests",
                       "type": "stat"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 2,
                             "unit": "reqps"
                          }
                       },
                       "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 6,
                          "y": 0
                       },
                       "id": 2,
                       "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "reduceOptions": {
                             "calcs": [
                                "lastNotNull"
                             ]
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
                             "refId": "A"
                          }
                       ],
                       "title": "Requests / sec (current)",
                       "type": "stat"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 2,
                             "thresholds": {
                                "mode": "absolute",
                                "steps": [
                                   {
                                      "color": "green",
                                      "value": null
                                   },
                                   {
                                      "color": "orange",
                                      "value": 1
                                   },
                                   {
                                      "color": "red",
                                      "value": 5
                                   }
                                ]
                             },
                             "unit": "percent"
                          }
                       },
                       "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 12,
                          "y": 0
                       },
                       "id": 3,
                       "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "reduceOptions": {
                             "calcs": [
                                "lastNotNull"
                             ]
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "100 * sum(rate(istio_requests_total{reporter=\"source\",response_code=~\"5..\"}[5m])) / sum(rate(istio_requests_total{reporter=\"source\"}[5m]))",
                             "refId": "A"
                          }
                       ],
                       "title": "Error Rate (5xx)",
                       "type": "stat"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 1,
                             "unit": "ms"
                          }
                       },
                       "gridPos": {
                          "h": 4,
                          "w": 6,
                          "x": 18,
                          "y": 0
                       },
                       "id": 4,
                       "options": {
                          "colorMode": "value",
                          "graphMode": "area",
                          "reduceOptions": {
                             "calcs": [
                                "lastNotNull"
                             ]
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
                             "refId": "A"
                          }
                       ],
                       "title": "p95 Latency",
                       "type": "stat"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "custom": {
                                "fillOpacity": 20,
                                "stacking": {
                                   "mode": "normal"
                                }
                             },
                             "unit": "reqps"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 4
                       },
                       "id": 5,
                       "options": {
                          "legend": {
                             "calcs": [
                                "mean",
                                "max"
                             ],
                             "displayMode": "table",
                             "placement": "bottom"
                          },
                          "tooltip": {
                             "mode": "multi"
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m])) by (destination_service_name)",
                             "legendFormat": "{{destination_service_name}}",
                             "refId": "A"
                          }
                       ],
                       "title": "Request Rate by Destination",
                       "type": "timeseries"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "custom": {
                                "fillOpacity": 20,
                                "stacking": {
                                   "mode": "normal"
                                }
                             },
                             "unit": "reqps"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 12,
                          "y": 4
                       },
                       "id": 6,
                       "options": {
                          "legend": {
                             "calcs": [
                                "mean",
                                "max"
                             ],
                             "displayMode": "table",
                             "placement": "bottom"
                          },
                          "tooltip": {
                             "mode": "multi"
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_requests_total{reporter=\"source\"}[5m])) by (response_code)",
                             "legendFormat": "{{response_code}}",
                             "refId": "A"
                          }
                       ],
                       "title": "Requests by Status Code",
                       "type": "timeseries"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 0,
                             "unit": "short"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 12
                       },
                       "id": 7,
                       "options": {
                          "displayMode": "gradient",
                          "orientation": "horizontal",
                          "reduceOptions": {
                             "calcs": [
                                "lastNotNull"
                             ]
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "topk(10, sum(increase(istio_requests_total{reporter=\"source\"}[$__range])) by (destination_service_name))",
                             "instant": true,
                             "legendFormat": "{{destination_service_name}}",
                             "refId": "A"
                          }
                       ],
                       "title": "Top Destinations (by request count)",
                       "type": "bargauge"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "unit": "ms"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 12,
                          "y": 12
                       },
                       "id": 8,
                       "options": {
                          "legend": {
                             "displayMode": "list",
                             "placement": "bottom"
                          },
                          "tooltip": {
                             "mode": "multi"
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
                             "legendFormat": "p50",
                             "refId": "A"
                          },
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
                             "legendFormat": "p95",
                             "refId": "B"
                          },
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket{reporter=\"source\"}[5m])) by (le))",
                             "legendFormat": "p99",
                             "refId": "C"
                          }
                       ],
                       "title": "Latency Percentiles (all destinations)",
                       "type": "timeseries"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "unit": "reqps"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 0,
                          "y": 20
                       },
                       "id": 9,
                       "options": {
                          "legend": {
                             "calcs": [
                                "max"
                             ],
                             "displayMode": "table",
                             "placement": "bottom"
                          },
                          "tooltip": {
                             "mode": "multi"
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_requests_total{reporter=\"source\",response_code=~\"5..\"}[5m])) by (destination_service_name)",
                             "legendFormat": "{{destination_service_name}}",
                             "refId": "A"
                          }
                       ],
                       "title": "Error Rate by Destination (5xx)",
                       "type": "timeseries"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "unit": "Bps"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 12,
                          "x": 12,
                          "y": 20
                       },
                       "id": 10,
                       "options": {
                          "legend": {
                             "displayMode": "list",
                             "placement": "bottom"
                          },
                          "tooltip": {
                             "mode": "multi"
                          }
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_request_bytes_sum{reporter=\"source\"}[5m]))",
                             "legendFormat": "request bytes/s",
                             "refId": "A"
                          },
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum(rate(istio_response_bytes_sum{reporter=\"source\"}[5m]))",
                             "legendFormat": "response bytes/s",
                             "refId": "B"
                          }
                       ],
                       "title": "Bytes Transferred",
                       "type": "timeseries"
                    },
                    {
                       "datasource": {
                          "type": "prometheus",
                          "uid": "PAE45454D0EDB9216"
                       },
                       "fieldConfig": {
                          "defaults": {
                             "decimals": 0,
                             "unit": "short"
                          }
                       },
                       "gridPos": {
                          "h": 8,
                          "w": 24,
                          "x": 0,
                          "y": 28
                       },
                       "id": 11,
                       "options": {
                          "showHeader": true,
                          "sortBy": [
                             {
                                "desc": true,
                                "displayName": "Value"
                             }
                          ]
                       },
                       "pluginVersion": "v13.0.0",
                       "targets": [
                          {
                             "datasource": {
                                "type": "prometheus",
                                "uid": "PAE45454D0EDB9216"
                             },
                             "expr": "sum by (source_workload, destination_service_name, response_code) (increase(istio_requests_total{reporter=\"source\"}[$__range]))",
                             "format": "table",
                             "instant": true,
                             "refId": "A"
                          }
                       ],
                       "title": "Traffic Detail (source -> destination -> status)",
                       "transformations": [
                          {
                             "id": "organize",
                             "options": {
                                "excludeByName": {
                                   "Time": true
                                },
                                "renameByName": {
                                   "Value": "Requests",
                                   "destination_service_name": "Destination",
                                   "response_code": "Status",
                                   "source_workload": "Source"
                                }
                             }
                          }
                       ],
                       "type": "table"
                    }
                 ],
                 "refresh": "30s",
                 "schemaVersion": 39,
                 "tags": [
                    "web",
                    "istio",
                    "gateway"
                 ],
                 "time": {
                    "from": "now-6h",
                    "to": "now"
                 },
                 "timezone": "browser",
                 "title": "Web Analytics (Istio Gateway)",
                 "uid": "web-analytics",
                 "version": 1
              }
