# Tempo
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "0"
helmCharts:
  - name: tempo
    repo: https://grafana-community.github.io/helm-charts
    version: 2.2.3
    releaseName: tempo
    namespace: observability
    valuesInline:
      persistence:
        enabled: true
        storageClassName: local-path
