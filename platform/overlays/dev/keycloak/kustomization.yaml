# The `keycloak` component of the `platform` layer. No blanket `namespace:`
# transformer here -- the Database CR must carry metadata.namespace: storage
# while everything else is in `keycloak`, so each authored CR declares its
# own metadata.namespace explicitly (exactly as storage's authored CRs do).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - operator/
  - ../../../../secrets/dev/platform/keycloak
  - keycloak-database.yaml
  - keycloak.yaml
  - keycloak-realm.yaml
  - keycloak-httproute.yaml
