apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  # host is the shared postgres Cluster's Service, not keycloak-specific.
  # The `keycloak` login role is created by storage/overlays/dev/postgres-cluster.yaml's
  # spec.managed.roles[]; keycloak-database.yaml's Database CR only provisions the
  # `keycloak` database and assigns that already-existing role as owner.
  db:
    vendor: postgres
    host: postgres-rw.storage.svc
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db
      key: username
    passwordSecret:
      name: keycloak-db
      key: password
  ingress:
    enabled: false
  http:
    httpEnabled: true
  hostname:
    hostname: https://auth.127.0.0.1.nip.io
  proxy:
    headers: xforwarded
  bootstrapAdmin:
    user:
      secret: keycloak-admin
