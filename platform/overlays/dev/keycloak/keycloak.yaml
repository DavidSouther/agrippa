# The Keycloak CR, wired to the shared postgres Cluster over its plain-HTTP
# listener. Syncs after keycloak-database.yaml's Database CR -- the database
# must already exist when this CR's pod connects.
apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  instances: 1
  # The Operator's own default request (1700Mi memory) doesn't schedule on
  # the single-node k3d-agrippa-dev cluster -- its 16Gi allocatable is
  # ~99% requested by everything else already live (istiod alone requests
  # 2Gi; Loki's chunks-cache alone requests ~9.8Gi). Scoped down to match
  # this CR's other dev sizing (spec.instances: 1, a single minimal proof
  # realm).
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  db:
    vendor: postgres
    host: postgres-rw.storage.svc
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db
      key: username
    passwordSecret:
      name: keycloak-db
      key: password
  ingress:
    enabled: false
  http:
    httpEnabled: true
  hostname:
    hostname: https://auth.127.0.0.1.nip.io
  proxy:
    headers: xforwarded
  bootstrapAdmin:
    user:
      secret: keycloak-admin
