# The CNPG Database CR for the keycloak database. metadata.namespace: storage
# -- CNPG's Database.spec.cluster is a same-namespace-only LocalObjectReference
# (issue #6043); this file lives in this feature's tree but the object lands
# in `storage`, exactly as core's Certificate/Gateway land in istio-ingress.
# Must sync before keycloak.yaml's Keycloak CR: the database has to exist
# before that CR's pod tries to connect, or its startup crash-loop blocks
# ArgoCD from ever reaching a Healthy sync.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  name: keycloak
  owner: keycloak
  cluster:
    name: postgres
