# Wave -5: the CNPG Database CR for the keycloak database. NOTE
# metadata.namespace: storage -- CNPG's Database.spec.cluster is a
# same-namespace-only LocalObjectReference (issue #6043); this file lives in
# this feature's tree but the object lands in `storage`, exactly as core's
# Certificate/Gateway land in istio-ingress.
# NOTE wave -5 (not 5): the keycloak database must exist before the wave-0
# Keycloak CR's pod connects to it -- see plan.md Step 2's placement and
# design.md's "Correction by the long-loop reviewer (2026-07-09)" (spec
# lands Step 2).
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: keycloak
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  name: keycloak
  owner: keycloak
  cluster:
    name: postgres
