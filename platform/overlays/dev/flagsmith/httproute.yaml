# Wave 5: routes the flagsmith dev host through the shared Gateway to the
# API/frontend Services. `matches` authored explicitly on both rules --
# Networking's own live-hit trap (an omitted `matches:` left `core`
# permanently OutOfSync); avoided here by design fiat, same as
# argocd-httproute.yaml/keycloak-httproute.yaml/forgejo's own httproute.yaml.
#
# BUILD-TIME FINDING: Service names/ports confirmed live (`kubectl -n
# flagsmith get svc`): flagsmith-api:8000, flagsmith-frontend:8080 --
# matches the design's "expected" guess exactly.
#
# BUILD-TIME FINDING: the API's bare `/health` path (not just the chart's
# own readinessProbe path `/health/readiness/`) is itself the DB-gated
# django-health-check aggregate view -- confirmed live via an in-cluster
# curl showing both `DatabaseBackend` and `MigrationsHealthCheck` as
# "working" in the response body. Routing PathPrefix `/health` to the API
# Service exercises that same DB-gated check tests/feature-flags.bats
# already asserts on; no test correction needed.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flagsmith
  namespace: flagsmith
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  parentRefs:
    - name: agrippa-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - flagsmith.127.0.0.1.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /health
      backendRefs:
        - name: flagsmith-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: flagsmith-frontend
          port: 8080
