# The `forgejo` component of the `platform` layer. No blanket `namespace:`
# transformer here -- the Database CR must carry metadata.namespace: storage
# while everything else is in `forgejo`, so each authored CR declares its
# own metadata.namespace explicitly, exactly as keycloak/kustomization.yaml's
# own precedent. This step: resources: [namespace.yaml] only -- the rest
# lands in Steps 2-3.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
