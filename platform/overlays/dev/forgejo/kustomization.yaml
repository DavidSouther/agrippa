# The `forgejo` component of the `platform` layer. No blanket `namespace:`
# transformer here -- the Database CR (and the db-storage.enc.yaml Secret)
# must carry metadata.namespace: storage while everything else is in
# `forgejo`, so each authored CR declares its own metadata.namespace
# explicitly, exactly as keycloak/kustomization.yaml's own precedent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - ../../../../secrets/dev/platform/forgejo
  - forgejo-database.yaml
  - chart/
  - httproute.yaml
