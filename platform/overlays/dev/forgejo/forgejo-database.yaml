# The CNPG Database CR for the forgejo database. metadata.namespace: storage
# -- CNPG's Database.spec.cluster is a same-namespace-only
# LocalObjectReference (cloudnative-pg/cloudnative-pg#6043); this file lives
# in this feature's tree but the object lands in `storage`, exactly as
# keycloak-database.yaml's own precedent. Must sync before the chart's
# Forgejo Deployment: the forgejo database has to exist before that
# Deployment's pod tries to connect, or its startup crash-loop blocks
# ArgoCD from ever reaching a Healthy sync.
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: forgejo
  namespace: storage
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  name: forgejo
  owner: forgejo
  cluster:
    name: postgres
