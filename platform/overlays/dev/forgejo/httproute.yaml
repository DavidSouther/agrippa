# Routes the git dev host through the shared Gateway to forgejo-http.
# Plain-HTTP backend -- service.http.type defaults to ClusterIP on port
# 3000 (chart default), and Forgejo's own server.PROTOCOL defaults to
# http, so no DestinationRule re-origination is needed (the argocd-style
# HTTPS-backend case does not apply here). `matches` is authored explicitly
# even though PathPrefix "/" is the Gateway API schema's own default for an
# omitted rule: ArgoCD's ServerSideDiff mispredicts against that omitted-vs-
# defaulted structural difference, leaving this permanently OutOfSync if
# left implicit.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
  namespace: forgejo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  parentRefs:
    - name: agrippa-gateway
      namespace: istio-ingress
      sectionName: https
  hostnames:
    - git.davidsouther.com.127.0.0.1.nip.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: forgejo-http
          port: 3000
