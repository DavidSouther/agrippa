# KSOPS generator: decrypts the two sops-encrypted credential files at
# `kustomize build` time (repo-server side, via the sops-age trust root
# mounted into the ArgoCD repo-server init container).
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: storage-secret-generator
files:
  - postgres/smoke.enc.yaml
  - valkey/smoke.enc.yaml
  - postgres/keycloak.enc.yaml
  - postgres/flagsmith.enc.yaml
