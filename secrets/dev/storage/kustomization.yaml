# Wave -5: sops-encrypted, KSOPS-decrypted credentials for the storage layer.
# Self-contained sub-kustomization (referenced from
# storage/overlays/dev/kustomization.yaml as ../../../secrets/dev/storage)
# so the default LoadRestrictionsRootOnly restrictor never trips.
#
# TEMPORARILY REVERTED to generators: [] (blocked, not abandoned): enabling
# secret-generator.yaml (kind: ksops) live-errors the storage Application
# into ComparisonError -- the ArgoCD repo-server's existing KSOPS install
# (apps/platform/argocd/kustomization.yaml, from the already-completed
# gitops-argocd feature-step) mounts the ksops binary at /usr/local/bin/ksops
# per its README, but never at kustomize's own exec-plugin path
# ($XDG_CONFIG_HOME/kustomize/plugin/viaduct.ai/v1/ksops/ksops), so
# `kustomize build` fails with "unable to find plugin root" the moment any
# kustomization actually uses a `kind: ksops` generator -- this feature-step
# is the first. That fix touches the shared ArgoCD repo-server Deployment
# (apps/platform/argocd/kustomization.yaml), a cluster-wide control-plane
# component outside this feature-step's own scope, so it is deferred pending
# a scope decision rather than applied here. secret-generator.yaml and both
# sealed *.enc.yaml files stay committed, decrypt-ready, and untouched --
# only this one generators: [] line is reverted, to keep `storage`
# Synced/Healthy in the meantime.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators: []
