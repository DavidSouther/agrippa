# Wave -5: sops-encrypted, KSOPS-decrypted credentials for the storage layer.
# Self-contained sub-kustomization (referenced from
# storage/overlays/dev/kustomization.yaml as ../../../secrets/dev/storage)
# so the default LoadRestrictionsRootOnly restrictor never trips.
#
# Blocker resolved (cd1a563): the ArgoCD repo-server now also mounts the
# custom-tools ksops binary at kustomize's own exec-plugin path
# (/.config/kustomize/plugin/viaduct.ai/v1/ksops/ksops), alongside the
# pre-existing /usr/local/bin/ksops mount -- live-verified against a
# fresh argocd-repo-server pod. secret-generator.yaml is re-enabled below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators: [secret-generator.yaml]
