# Wave -5: sops-encrypted, KSOPS-decrypted credentials for the keycloak
# component of the platform layer. Self-contained sub-kustomization
# (referenced from platform/overlays/dev/keycloak/kustomization.yaml as
# ../../../../secrets/dev/platform/keycloak) so the default
# LoadRestrictionsRootOnly restrictor never trips. First Secrets path
# committed under a platform/ prefix.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators:
  - secret-generator.yaml
