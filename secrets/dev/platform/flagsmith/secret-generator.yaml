# KSOPS generator: decrypts the two sops-encrypted credential files at
# `kustomize build` time (repo-server side, via the sops-age trust root
# mounted into the ArgoCD repo-server init container). The third flagsmith
# credential (flagsmith-db, the CNPG basic-auth Secret) is sealed under
# secrets/dev/storage/postgres/ and referenced from storage's own
# secret-generator.yaml instead, matching keycloak's own precedent.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: platform-flagsmith-secret-generator
files:
  - database-url.enc.yaml
  - secret-key.enc.yaml
