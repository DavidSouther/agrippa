# Wave -5: sops-encrypted, KSOPS-decrypted credentials for the flagsmith
# component of the platform layer. Self-contained sub-kustomization
# (referenced from platform/overlays/dev/flagsmith/kustomization.yaml as
# ../../../../secrets/dev/platform/flagsmith) so the default
# LoadRestrictionsRootOnly restrictor never trips, exactly as
# secrets/dev/platform/keycloak's and secrets/dev/platform/forgejo's own
# precedent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators: []   # secret-generator.yaml (kind: ksops) lands Step 2
