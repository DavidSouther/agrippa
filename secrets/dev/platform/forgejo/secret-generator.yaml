# KSOPS generator: decrypts the three sops-encrypted credential files at
# `kustomize build` time (repo-server side, via the sops-age trust root
# mounted into the ArgoCD repo-server init container).
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: platform-forgejo-secret-generator
files:
  - admin.enc.yaml
  - db-storage.enc.yaml
  - db-forgejo.enc.yaml
