# sops-encrypted, KSOPS-decrypted credentials for the forgejo component of
# the platform layer. Self-contained sub-kustomization (referenced from
# platform/overlays/dev/forgejo/kustomization.yaml as
# ../../../../secrets/dev/platform/forgejo) so the default
# LoadRestrictionsRootOnly restrictor never trips, exactly as
# secrets/dev/platform/keycloak's own precedent. Unlike keycloak's secrets,
# split across secrets/dev/storage/ and secrets/dev/platform/keycloak/, all
# three forgejo credentials (admin, plus the two same-password db-forgejo
# copies for namespaces storage and forgejo) are generated from this one
# component-owned generator -- db-storage.enc.yaml still carries its own
# metadata.namespace: storage and lands there regardless, same as
# forgejo-database.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators:
  - secret-generator.yaml
