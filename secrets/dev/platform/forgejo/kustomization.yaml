# Wave -5: sops-encrypted, KSOPS-decrypted credentials for the forgejo
# component of the platform layer. Self-contained sub-kustomization
# (referenced from platform/overlays/dev/forgejo/kustomization.yaml as
# ../../../../secrets/dev/platform/forgejo) so the default
# LoadRestrictionsRootOnly restrictor never trips, exactly as
# secrets/dev/platform/keycloak's own precedent. Holds all three forgejo
# credentials (admin, plus the two same-password db-forgejo copies for
# namespaces storage and forgejo) -- unlike keycloak's split across
# secrets/dev/storage/ and secrets/dev/platform/keycloak/, plan.md scopes
# all three to this one component-owned generator (cleared design/plan
# choice; the rendered db-storage.enc.yaml Secret still carries its own
# metadata.namespace: storage and lands there regardless of which
# Application's tree the manifest lives in, exactly as forgejo-database.yaml
# itself does).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
generators:
  - secret-generator.yaml
